name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  copilot-requests: write

jobs:
  release:
    name: Build, notarize, and release
    runs-on: macos-26
    env:
      APP_NAME: Alveary
      SCHEME: Alveary
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure release paths
        run: |
          {
            echo "ARCHIVE_PATH=$RUNNER_TEMP/Alveary.xcarchive"
            echo "EXPORT_PATH=$RUNNER_TEMP/export"
            echo "RELEASE_PATH=$RUNNER_TEMP/release"
            echo "RELEASE_NOTES_PATH=$GITHUB_WORKSPACE/.release-notes.md"
            echo "KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db"
          } >> "$GITHUB_ENV"

      - name: Detect release version
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
          IS_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: scripts/ci/detect-release-version.py

      - name: Stop when no release build requested
        if: steps.version.outputs.should_build != 'true'
        run: echo "No release build requested."

      - name: Ensure tag does not already exist
        if: steps.version.outputs.should_release == 'true'
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: scripts/ci/ensure-release-tag-available.sh

      - name: Install build tools
        if: steps.version.outputs.should_build == 'true'
        run: scripts/ci/install-release-tools.sh

      - name: Generate Xcode project
        if: steps.version.outputs.should_build == 'true'
        run: xcodegen generate

      - name: Import signing certificate
        if: steps.version.outputs.should_build == 'true'
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: scripts/ci/import-signing-certificate.sh

      - name: Archive app
        if: steps.version.outputs.should_build == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: scripts/ci/archive-release-app.sh

      - name: Export Developer ID app
        if: steps.version.outputs.should_build == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: scripts/ci/export-developer-id-app.sh

      - name: Verify exported app metadata
        if: steps.version.outputs.should_build == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
        run: scripts/ci/verify-exported-app.sh

      - name: Notarize and staple app
        if: steps.version.outputs.should_build == 'true'
        env:
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: scripts/ci/notarize-and-staple-app.sh

      - name: Create release ZIP
        if: steps.version.outputs.should_build == 'true'
        id: package
        run: scripts/ci/create-release-zip.sh

      - name: Upload dry run artifact
        if: steps.version.outputs.should_build == 'true' && steps.version.outputs.should_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Alveary-dry-run-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

      - name: Resolve previous release tag
        if: steps.version.outputs.should_release == 'true'
        id: previous_tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: scripts/ci/resolve-previous-release.py

      - name: Set up Node.js
        if: steps.version.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Copilot CLI
        if: steps.version.outputs.should_release == 'true'
        run: npm install --global @github/copilot

      - name: Build release notes with Copilot
        if: steps.version.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.tag }}
          RELEASE_NOTES_BASE: ${{ steps.previous_tag.outputs.notes_base }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          candidate_commit_count=$(git log \
            --format='%s' \
            --extended-regexp \
            --invert-grep \
            --grep='^Release Alveary v[0-9]+\.[0-9]+\.[0-9]+$' \
            "$RELEASE_NOTES_BASE..HEAD" | wc -l | tr -d '[:space:]')
          prompt=$(printf '%s\n' \
            "Review the git log and commit diffs in range ${RELEASE_NOTES_BASE}..HEAD and write a concise Markdown bullet list summarizing all code changes made since release ${PREVIOUS_TAG}." \
            "Exclude version-release commits and any other commits that are not relevant to a user-facing changelog." \
            "End every bullet with the short commit hash as a Markdown link in parentheses, followed by the GitHub username of the commit author, using this exact suffix format: ([\`short-hash\`](https://github.com/${GITHUB_REPOSITORY}/commit/full-hash)) by @username." \
            "Begin with exactly this Markdown header: ## What's changed" \
            "Put the first bullet directly after the header with no introduction or other content between them, and keep every bullet on one line." \
            "The final line must exactly equal the following text, with no trailing punctuation:" \
            "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG_NAME}" \
            "Use the write tool to write the complete final output directly to this Markdown file: ${RELEASE_NOTES_PATH}" \
            "Write nothing to that file except the header, bullet list, and Full Changelog link. Do not use a code fence." \
            "Do not modify any other files, and do not return the release notes in your response after writing the file.")

          rm -f "$RELEASE_NOTES_PATH"
          if [[ -n "$(git status --porcelain --untracked-files=all)" ]]; then
            echo "error: checkout is not clean before release-note generation" >&2
            exit 1
          fi

          if (( candidate_commit_count > 0 )); then
            copilot --silent --no-ask-user --no-custom-instructions \
              --allow-tool='shell(git log:*)' \
              --allow-tool='shell(git show:*)' \
              --allow-tool=write \
              -p "$prompt" > /dev/null
          else
            printf "## What's changed\n\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n" \
              "$GITHUB_REPOSITORY" "$PREVIOUS_TAG" "$TAG_NAME" > "$RELEASE_NOTES_PATH"
          fi

          if [[ "$(git status --porcelain --untracked-files=all)" != "?? .release-notes.md" ]]; then
            echo "error: release-note generation modified unexpected workspace files" >&2
            exit 1
          fi

          expected_full_changelog="**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG_NAME}"
          actual_first_line=$(awk 'NF { print; exit }' "$RELEASE_NOTES_PATH")
          actual_final_line=$(awk 'NF { line = $0 } END { print line }' "$RELEASE_NOTES_PATH")
          invalid_body_line_count=$(awk \
            -v expected_header="## What's changed" \
            -v full_changelog="$expected_full_changelog" '
            NF && $0 != expected_header && $0 != full_changelog && $0 !~ /^- / { count += 1 }
            END { print count + 0 }
          ' "$RELEASE_NOTES_PATH")
          if [[ "$actual_first_line" != "## What's changed" ||
                "$actual_final_line" != "$expected_full_changelog" ||
                "$invalid_body_line_count" -ne 0 ]]; then
            echo "error: Copilot generated release notes outside the required Markdown format" >&2
            exit 1
          fi

      - name: Create and push tag
        if: steps.version.outputs.should_release == 'true'
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: scripts/ci/create-release-tag.sh

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          ZIP_PATH: ${{ steps.package.outputs.zip_path }}
        run: scripts/ci/create-github-release.sh
