included:
  - Alveary
  - AlvearyTests
excluded:
  - Alveary/DI/Generated
line_length:
  warning: 150
  error: 200
type_body_length:
  warning: 400
  error: 600
file_length:
  warning: 500
  error: 800
disabled_rules:
  - trailing_whitespace
  - opening_brace
opt_in_rules:
  - force_unwrapping
  - force_cast
custom_rules:
  transcript_font_helpers:
    included:
      - "Alveary/Views/Chat/Blocks/.*\\.swift"
      - "Alveary/Views/Chat/ChatSupplementaryViews\\.swift"
      - "Alveary/Views/Chat/Transcript/.*\\.swift"
      - "Alveary/Views/Components/Markdown/Rendering/.*\\.swift"
    excluded:
      - "Alveary/Views/Chat/Blocks/TranscriptTypography.swift"
    name: "Transcript Font Helpers"
    regex: "\\.font\\s*\\("
    message: "Transcript text must inherit typography or use transcriptFont()/transcriptCodeFont()."
    severity: error
