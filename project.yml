name: Alveary
options:
  bundleIdPrefix: com.afollestad
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
schemes:
  Alveary:
    build:
      targets:
        Alveary: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AlvearyTests
      environmentVariables:
        ALVEARY_HOSTED_UNIT_TEST: "1"
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
fileGroups:
  - docs
targets:
  Alveary:
    type: application
    platform: macOS
    sources:
      - path: Alveary
        excludes:
          - "**/.DS_Store"
          - "**/AGENTS.md"
          - "**/CLAUDE.md"
      - path: AppIcon.icon
    dependencies:
      - package: needle
        product: NeedleFoundation
      - package: BlockInputKit
        product: BlockInputKit
      - package: FluidAudio
        product: FluidAudio
      - package: AgentCLIKit
        product: AgentCLIKit
      - package: SwiftTerm
        product: SwiftTerm
      - sdk: Carbon.framework
      - sdk: AVFoundation.framework
      - sdk: IOKit.framework
      - sdk: ScreenCaptureKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.afollestad.alveary
        MARKETING_VERSION: 0.1.6
        CURRENT_PROJECT_VERSION: 7
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Config/CodeSigning/Alveary.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          OTHER_CODE_SIGN_FLAGS: "--requirements $(SRCROOT)/Config/CodeSigning/AlvearyDebugTCC.requirements"
    preBuildScripts:
      - name: Needle Code Generation
        basedOnDependencyAnalysis: false
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"

          NEEDLE_CLI=""
          if command -v needle &> /dev/null; then
            NEEDLE_CLI="needle"
          fi
          if [ -z "$NEEDLE_CLI" ]; then
            echo "error: needle is required for code generation. Install via 'brew install needle'."
            exit 1
          fi

          NEEDLE_VERSION="$("$NEEDLE_CLI" version 2>/dev/null || true)"
          if [ "$NEEDLE_VERSION" != "0.25.1" ]; then
            echo "error: needle 0.25.1 is required to match the pinned NeedleFoundation package. Found: ${NEEDLE_VERSION:-unknown}."
            exit 1
          fi

          mkdir -p "${SRCROOT}/Alveary/DI/Generated"
          export SOURCEKIT_LOGGING=0
          "$NEEDLE_CLI" generate \
            "${SRCROOT}/Alveary/DI/Generated/NeedleGenerated.swift" \
            "${SRCROOT}/Alveary/DI" \
            --exclude-paths "/DI/Generated"
          python3 -c 'import os; from pathlib import Path; path = Path(os.environ["SRCROOT"]) / "Alveary/DI/Generated/NeedleGenerated.swift"; text = path.read_text(); path.write_text(text if text.endswith("\n") else text + "\n")'
    postBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint &> /dev/null; then
            swiftlint
          fi
  AlvearyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AlvearyTests
        excludes:
          - "**/.DS_Store"
          - "**/AGENTS.md"
          - "**/CLAUDE.md"
    dependencies:
      - target: Alveary
      - package: BlockInputKit
        product: BlockInputKit
      - package: AgentCLIKit
        product: AgentCLIKit
      - package: swift-snapshot-testing
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.afollestad.alveary.tests
        GENERATE_INFOPLIST_FILE: YES
packages:
  AgentCLIKit:
    url: https://github.com/afollestad/AgentCLIKit.git
    revision: "12a2860bd7c354d53e3ffba5c2ff2d531499fea1"
  BlockInputKit:
    url: https://github.com/afollestad/BlockInputKit.git
    revision: "3c53a5c67874ec23dfea00c0814d00fdc98a61af"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    exactVersion: "0.15.5"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    revision: "d5ee56e1c74777120f3af688600d336de4201bd2"
  needle:
    url: https://github.com/uber/needle.git
    revision: "69f7a889d2736f2621c6083ac29e0a75d158f249"
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"
