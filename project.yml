name: Alveary
options:
  bundleIdPrefix: com.afollestad
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  Alveary:
    type: application
    platform: macOS
    sources:
      - path: Alveary
        excludes:
          - "**/.DS_Store"
          - "**/AGENTS.md"
          - "**/CLAUDE.md"
      - path: AppIcon.icon
    dependencies:
      - package: knit
        product: Knit
      - package: textual
        product: Textual
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.afollestad.alveary
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    preBuildScripts:
      - name: Knit Code Generation
        script: |
          KNIT_CLI=""
          if command -v knit-cli &> /dev/null; then
            KNIT_CLI="knit-cli"
          elif [ -f "$HOME/.mint/bin/knit-cli" ]; then
            KNIT_CLI="$HOME/.mint/bin/knit-cli"
          fi
          if [ -z "$KNIT_CLI" ]; then
            echo "error: knit-cli is required for code generation. Install via 'mint install cashapp/knit knit-cli'."
            exit 1
          fi
          mkdir -p "${SRCROOT}/Alveary/DI/Generated"
          "$KNIT_CLI" gen \
            --assembly-input-path "${SRCROOT}/Alveary/DI" \
            --type-safety-extensions-output-path "${SRCROOT}/Alveary/DI/Generated/KnitExtensions.swift"
          chmod u+w "${SRCROOT}/Alveary/DI/Generated/KnitExtensions.swift"
          python3 -c 'import os; from pathlib import Path; path = Path(os.environ["SRCROOT"]) / "Alveary/DI/Generated/KnitExtensions.swift"; text = path.read_text(); path.write_text(text if text.endswith("\n") else text + "\n")'
          chmod a-w "${SRCROOT}/Alveary/DI/Generated/KnitExtensions.swift"
        inputFiles: []
        outputFiles: []
    postBuildScripts:
      - name: SwiftLint
        script: |
          if command -v swiftlint &> /dev/null; then
            swiftlint
          fi
  AlvearyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AlvearyTests
        excludes:
          - "**/.DS_Store"
          - "**/AGENTS.md"
          - "**/CLAUDE.md"
    dependencies:
      - target: Alveary
      - package: swift-snapshot-testing
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.afollestad.alveary.tests
        GENERATE_INFOPLIST_FILE: YES
packages:
  knit:
    url: https://github.com/cashapp/knit
    revision: "3d4afea562b95a95725f689be819b10ff93351fc"
  textual:
    url: https://github.com/gonzalezreal/textual
    from: "0.3.1"
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"
